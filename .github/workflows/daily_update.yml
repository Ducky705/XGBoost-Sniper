name: Daily Sniper Update

on:
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC daily
  workflow_dispatch:
    inputs:
      full_run:
        description: 'Run full historical simulation'
        required: false
        default: 'false'
        type: boolean

jobs:
  update-stats:
    runs-on: ubuntu-latest
    # ADD WRITE PERMISSIONS FOR PUSHING CHANGES
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }} 
          persist-credentials: false # DISABLE auto-auth to prevent conflicts

      - name: Update Private Submodules
        run: |
          # 1. Configure PAT for the private models repo
          git config --global url."https://${{ secrets.GH_PAT }}@github.com/Ducky705/XGBoost-Sniper-Models.git".insteadOf "https://github.com/Ducky705/XGBoost-Sniper-Models.git"
          
          # 2. Update to latest commit on remote
          git submodule update --init --recursive --remote --merge
          echo "✅ Submodules updated to latest remote commits."

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libpng-dev

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Monitoring Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          if [[ "${{ github.event.inputs.full_run }}" == "true" ]]; then
            python3 scripts/monitor.py --full
          else
            # 180 days covers everything back to Nov 2025
            python3 scripts/monitor.py --days 180
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "SniperBot"
          git config --global user.email "bot@noreply.github.com"
          
          # Check for changes
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit from monitor run."
          else
            git add .
            git commit -m "📈 Auto-Update: Daily Dashboard"
            
            # Manually Authenticate for PUSH using GITHUB_TOKEN
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push
          fi
