name: Daily Quarry Pipeline

on:
  schedule:
    - cron: '0 9 * * *' # 9:00 AM UTC daily
  workflow_dispatch:
    inputs:
      full_run:
        description: 'Run full historical simulation'
        required: false
        default: false
        type: boolean

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          submodules: 'recursive'
          fetch-depth: 0

      - name: Update Submodules to Latest
        run: |
          git submodule update --init --recursive --remote --merge
          echo "✅ Submodules updated to latest remote commits."

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfreetype6-dev libpng-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Unified Daily Update
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          # The script handles days logic internally or via cached fetch
          python3 scripts/daily_update.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "QuarryBot"
          git config --global user.email "bot@quarry.institutional"
          
          # Add all modified files: docs, reports, assets
          git add docs/ README.md LATEST_ACTION.md assets/
          
          if [[ -z $(git status -s) ]]; then
            echo "No changes to commit."
          else
            git commit -m "📈 Auto-Update: Daily Pipeline Sync [$(date +'%Y-%m-%d')]"
            
            # Use GITHUB_TOKEN for push authentication
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            git push
          fi
